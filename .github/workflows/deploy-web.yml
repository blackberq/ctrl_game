name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  WEB_DIR: apps/web
  WEB_DIST_DIR: ${{ github.workspace }}/apps/web/dist
  WEB_BASE_PATH: /${{ github.event.repository.name }}/

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.0.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ env.WEB_DIR }}
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: |
          pnpm exec tsc --noEmit
          pnpm exec vite build --base="$WEB_BASE_PATH"

      - name: Verify web artifact
        run: test -f "$WEB_DIST_DIR/index.html"

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_TOKEN != '' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.WEB_DIST_DIR }}

  deploy:
    name: Deploy web
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
